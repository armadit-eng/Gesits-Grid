name: Build GESITS APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # bisa trigger manual dari GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java (butuh untuk Gradle/Android)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. Install dependencies (Capacitor)
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # 5. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 6. Init Capacitor Android platform
      - name: Add Capacitor Android platform
        run: |
          npx cap add android || echo "Android platform already exists"

      # 7. Siapkan folder www (webDir untuk Capacitor)
      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp sw.js www/
          cp gesits-motor.png www/
          cp icon-192.png www/
          cp icon-512.png www/
          cp ble-adapter.js www/
          echo "www contents:"
          ls -la www/

      # 8. Sync web assets ke Android project
      - name: Sync Capacitor
        run: npx cap sync android

      # 8. Set permissions AndroidManifest.xml
      - name: Patch AndroidManifest for Bluetooth
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Bluetooth permissions untuk BLE
          sed -i 's|<uses-permission android:name="android.permission.INTERNET"/>|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.BLUETOOTH"/>\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN"/>\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT"/>\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"/>|' "$MANIFEST"
          echo "Manifest patched:"
          cat "$MANIFEST"

      # 9. Patch build.gradle untuk minSdk & targetSdk
      - name: Patch build.gradle
        run: |
          GRADLE="android/app/build.gradle"
          sed -i 's/minSdkVersion .*/minSdkVersion 26/' "$GRADLE"
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' "$GRADLE"
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' "$GRADLE"
          echo "build.gradle patched"

      # 10. Build Debug APK (tidak butuh keystore)
      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      # 11. Upload APK sebagai artifact (bisa didownload dari Actions tab)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GESITS-Dashboard-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 12. Info summary
      - name: Build summary
        run: |
          APK_SIZE=$(du -sh android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)
          echo "## ✅ Build Berhasil!" >> $GITHUB_STEP_SUMMARY
          echo "- **APK Size:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download APK" >> $GITHUB_STEP_SUMMARY
          echo "Buka tab **Actions** → pilih run ini → scroll ke bawah → klik **GESITS-Dashboard-debug-${{ github.run_number }}**" >> $GITHUB_STEP_SUMMARY
          
